name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly

jobs:
  go-quality:
    name: Go Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with race detector
        run: go test -race -count=1 ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Check Go dependencies for known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: platform_ci
          POSTGRES_USER: platform_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform_ci -d platform_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://platform_ci:ci-only-password@127.0.0.1:5432/platform_ci?sslmode=disable
      TEST_DATABASE_URL: postgres://platform_ci:ci-only-password@127.0.0.1:5432/platform_ci?sslmode=disable
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Apply database migrations
        run: go run ./cmd/migrate

      - name: Run integration tests with race detector
        run: go test -race -count=1 -tags=integration ./...

  container-security:
    name: Container Security
    needs:
      - go-quality
      - integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      IMAGE_NAME: aws-production-web-platform-api
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build container image
        run: docker build --pull --tag "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.70.0
          cache: true

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: "0"
          skip-setup-trivy: true

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Scan container image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          vuln-type: os,library
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-setup-trivy: true
