name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Terraform Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: v0.63.1
          cache: true

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        working-directory: infra
        run: tflint --recursive --format compact

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.70.0
          cache: true

      - name: Scan Terraform configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-setup-trivy: true

  validate:
    name: Terraform Validate (${{ matrix.root.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        root:
          - name: bootstrap
            path: infra/bootstrap
          - name: foundation
            path: infra/foundation
          - name: dev
            path: infra/environments/dev
          - name: prod-reference
            path: infra/environments/prod-reference
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - name: Initialize without remote backend
        working-directory: ${{ matrix.root.path }}
        run: terraform init -backend=false -input=false

      - name: Validate configuration
        working-directory: ${{ matrix.root.path }}
        run: terraform validate

  plan:
    name: Terraform Plan (${{ matrix.environment.name }})
    needs:
      - static-analysis
      - validate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment:
          - name: dev
            path: infra/environments/dev
          - name: prod-reference
            path: infra/environments/prod-reference
    env:
      AWS_REGION: ap-northeast-1
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.3
          terraform_wrapper: false

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/aws-production-web-platform-terraform-plan
          role-session-name: terraform-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Initialize remote backend
        working-directory: ${{ matrix.environment.path }}
        run: terraform init -backend-config="bucket=aws-production-web-platform-tfstate-${{ vars.AWS_ACCOUNT_ID }}-${AWS_REGION}"

      - name: Create speculative plan
        working-directory: ${{ matrix.environment.path }}
        run: terraform plan -input=false -no-color -lock-timeout=5m
